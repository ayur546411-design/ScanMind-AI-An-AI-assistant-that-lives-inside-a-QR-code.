name = "qr-chat-proxy"
main = "src/index.js"
compatibility_date = "2026-07-12"

# KV namespace for rate limiting — bind after creating it:
#   wrangler kv namespace create RATE_LIMIT
# Then paste the returned id below.
[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "13f1224010184956865eae405978ae06"

# The GROQ_API_KEY is set via:
#   wrangler secret put GROQ_API_KEY
# NEVER put it in this file.
